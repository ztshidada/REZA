<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orders | Reza Admin</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/admin.js"></script><script>requireAuth();(async()=>{let d=await api('/api/orders',{headers:headers()}).catch(()=>({orders:[]}));shell('orders',`<div class="title"><h1>Orders</h1></div><div class="card"><table class="table"><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody>${(d.orders||[]).map(o=>`<tr><td>${o.orderNumber}</td><td>${o.customer?.name||''}<br>${o.customer?.phone||''}</td><td>R ${o.total}</td><td>${o.status}</td></tr>`).join('')}</tbody></table></div>`);})();</script>  <script src="js/api.js"></script>
</body></html>
