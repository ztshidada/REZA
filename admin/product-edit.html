<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product Edit | Reza Admin</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/admin.js"></script><script>requireAuth();let id=new URLSearchParams(location.search).get('id');let product={name:'',category:'Beauty',price:0,stock:0,badge:'',image:'',description:'',benefits:[],howToUse:'',showOnline:true};async function boot(){if(id){let d=await api('/api/products/'+id);product=d.product||product}draw()}function draw(){shell('products',`<div class="title"><h1>${id?'Edit':'New'} Product</h1><div><a class="btn light" href="products.html">Back</a> <button class="btn primary" onclick="save()">Save</button></div></div><div class="card"><div class="form"><div class="wide"><img class="preview" id="preview" src="${product.image||''}"><br><input class="input" type="file" onchange="readFile(this,v=>{product.image=v;document.getElementById('preview').src=v})"></div><input class="input" id="name" placeholder="Name" value="${product.name||''}"><input class="input" id="category" placeholder="Category" value="${product.category||''}"><input class="input" id="price" type="number" placeholder="Price" value="${product.price||0}"><input class="input" id="stock" type="number" placeholder="Stock" value="${product.stock||0}"><input class="input wide" id="badge" placeholder="Badge" value="${product.badge||''}"><textarea class="input wide" id="description" placeholder="Description">${product.description||''}</textarea><textarea class="input wide" id="benefits" placeholder="Benefits one per line">${(product.benefits||[]).join('\n')}</textarea><textarea class="input wide" id="howToUse" placeholder="How to use">${product.howToUse||''}</textarea></div></div>`)}async function save(){Object.assign(product,{name:document.getElementById('name').value,category:document.getElementById('category').value,price:Number(document.getElementById('price').value),stock:Number(document.getElementById('stock').value),badge:document.getElementById('badge').value,description:document.getElementById('description').value,benefits:document.getElementById('benefits').value.split('\n').filter(Boolean),howToUse:document.getElementById('howToUse').value,showOnline:true});let d=await api(id?'/api/products/'+id:'/api/products',{method:id?'PUT':'POST',headers:headers(),body:JSON.stringify(product)});if(d.success){toast('Saved');location.href='products.html'}else toast('Failed')}boot();</script></body></html>
