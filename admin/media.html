<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Media | Reza Admin</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/admin.js"></script><script>requireAuth();let media={};async function boot(){let d=await api('/api/media');media=d.media||{};draw()}function draw(){shell('media',`<div class="title"><h1>Media</h1><button class="btn primary" onclick="save()">Save</button></div><div class="card"><h2>Hero Background</h2><p>Upload the main champagne luxury hero background.</p><img class="preview" id="hero" src="${media.heroImage||''}"><br><input class="input" type="file" onchange="readFile(this,v=>{media.heroImage=v;document.getElementById('hero').src=v})"><br><br><input class="input" id="accentLine" value="${media.accentLine||'Champagne Luxury'}" placeholder="Accent line"></div>`)}async function save(){media.accentLine=document.getElementById('accentLine').value;let d=await api('/api/media',{method:'PUT',headers:headers(),body:JSON.stringify(media)});toast(d.success?'Saved':'Failed')}boot();</script>  <script src="js/media-fix.js"></script>
</body></html>
