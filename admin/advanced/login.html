<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login | Reza</title><link rel="stylesheet" href="../css/style.css?v=4">
<script>
(function () {
  try {
    var media = JSON.parse(localStorage.getItem("reza_background_images") || "{}");

    function cssUrl(value, fallback) {
      if (!value) return fallback;
      return 'url("' + String(value).replace(/"/g, '\\"') + '")';
    }

    document.documentElement.style.setProperty("--reza-bg-1", cssUrl(media.bg1, 'url("assets/images/background-image-1.png")'));
    document.documentElement.style.setProperty("--reza-bg-2", cssUrl(media.bg2, 'url("assets/images/background-image-2.png")'));
    document.documentElement.style.setProperty("--reza-bg-3", cssUrl(media.bg3, 'url("assets/images/background-image-3.png")'));

    if (media.logo) {
      document.documentElement.style.setProperty("--reza-logo-custom", 'url("' + String(media.logo).replace(/"/g, '\\"') + '")');
    }
  } catch (e) {}
})();
</script>

</head>
<body>
<section class="section">
  <div class="container" style="max-width:520px">
    <form class="form-card" id="loginForm">
      <h1 class="section-title">Admin Login</h1>
      <p><input class="input" id="email" placeholder="Email" value="admin@reza.co.za"></p>
      <p><input class="input" id="password" type="password" placeholder="Password" value="reza2026"></p>
      <button class="btn dark" type="submit" style="width:100%">Login</button>
      <p style="color:var(--muted)"></p>
    </form>
  </div>
</section>
<script src="../js/data.js"></script><script src="admin.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  if (email.value === ADMIN_EMAIL && password.value === ADMIN_PASSWORD) {
    localStorage.setItem("reza_admin_logged_in", "yes");
    backendLogin(email.value, password.value).catch(() => null).finally(() => location.href = "dashboard.html");
  } else {
    alert("Wrong login details.");
  }
});
</script>

<script src="../js/reza-final-live-sync.js"></script>
</body></html>
