<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Products | Reza Admin</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/admin.js"></script><script>requireAuth();async function load(){let d=await api('/api/products');shell('products',`<div class="title"><h1>Products</h1><a class="btn primary" href="product-edit.html">+ New Product</a></div><div class="card"><table class="table"><thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th></tr></thead><tbody>${(d.products||[]).map(p=>`<tr onclick="location.href='product-edit.html?id=${p.id}'" style="cursor:pointer"><td><img class="thumb" src="${p.image||''}"></td><td><b>${p.name}</b></td><td>${p.category||''}</td><td>R ${p.price}</td><td>${p.stock}</td></tr>`).join('')}</tbody></table></div>`)}load();</script>  <script src="js/api.js"></script>
</body></html>
