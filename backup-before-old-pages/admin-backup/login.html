<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login | Reza Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <form id="loginForm" class="card" style="width:min(460px,90vw)">
      <h1 style="font-family:Playfair Display,serif;font-size:3.4rem;margin:0 0 18px">Admin Login</h1>

      <input class="input" id="email" name="email" value="admin@reza.co.za" placeholder="Email">
      <br><br>

      <input class="input" id="password" name="password" value="reza2026" type="password" placeholder="Password">
      <br><br>

      <button class="btn primary" style="width:100%" type="submit">Login</button>

      <p id="loginMessage" style="margin-top:14px;color:#7e6f61;font-weight:800"></p>
    </form>
  </div>

  <script>
    const API_BASE =
      location.hostname.includes("localhost")
        ? "http://localhost:10000"
        : "https://api.rezaholdings.co.za";

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("loginMessage");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      msg.textContent = "Logging in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(API_BASE + "/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data.success) {
          msg.textContent = data.message || "Login failed.";
          return;
        }

        localStorage.setItem("reza_v11_admin_token", data.token);
        localStorage.setItem("REZA_API_BASE", API_BASE);

        msg.textContent = "Login successful. Opening dashboard...";
        window.location.href = "dashboard.html";
      } catch (error) {
        console.error(error);
        msg.textContent = "Could not connect to API. Check backend deployment.";
      }
    });
  </script>
  <script src="js/api.js"></script>
</body>
</html>
