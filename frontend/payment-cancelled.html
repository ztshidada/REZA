<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Payment Cancelled | Reza Holdings</title><link rel="stylesheet" href="css/style.css?v=7">
<script>
(function () {
  try {
    var media = JSON.parse(localStorage.getItem("reza_background_images") || "{}");

    function cssUrl(value, fallback) {
      if (!value) return fallback;
      return 'url("' + String(value).replace(/"/g, '\\"') + '")';
    }

    document.documentElement.style.setProperty("--reza-bg-1", cssUrl(media.bg1, 'url("assets/images/background-image-1.png")'));
    document.documentElement.style.setProperty("--reza-bg-2", cssUrl(media.bg2, 'url("assets/images/background-image-2.png")'));
    document.documentElement.style.setProperty("--reza-bg-3", cssUrl(media.bg3, 'url("assets/images/background-image-3.png")'));

    if (media.logo) {
      document.documentElement.style.setProperty("--reza-logo-custom", 'url("' + String(media.logo).replace(/"/g, '\\"') + '")');
    }
  } catch (e) {}
})();
</script>

</head>
<body>
<div data-header></div>
<main class="section thankyou-bg" style="min-height:75vh;display:grid;align-items:center"><div class="container"><div class="thankyou-card">
<h1 class="section-title">Payment cancelled.</h1>
<p>Your order was created, but the Yoco payment was cancelled. You can go back to checkout or contact Reza on WhatsApp.</p>
<div class="order-number-box" id="orderBox"></div>
<div class="hero-actions" style="justify-content:center"><a class="btn dark" href="checkout.html">Back to Checkout</a><a class="btn" href="https://wa.me/27793773550" target="_blank">WhatsApp Reza</a></div>
</div></div></main>
<div data-footer></div><div data-whatsapp></div>
<script src="js/data.js"></script><script src="js/main.js"></script>
<script>document.getElementById("orderBox").textContent = new URLSearchParams(location.search).get("order") || "REZA ORDER";</script>
</body></html>
