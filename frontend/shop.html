<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop | Reza Holdings</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;color:#241812;background:radial-gradient(circle at 80% 10%,rgba(244,199,184,.25),transparent 28%),#fff8ed}
    a{text-decoration:none;color:inherit}
    .top{background:#f2d7a5;text-align:center;padding:10px;font-weight:900;letter-spacing:.28em;font-size:.78rem}
    .nav{position:sticky;top:0;z-index:50;background:rgba(255,250,242,.9);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:18px 9%;box-shadow:0 10px 35px rgba(70,45,25,.08)}
    .brand{display:flex;align-items:center;gap:14px;font-weight:1000}
    .logo{width:52px;height:52px;border-radius:18px;background:#fff0c8;display:grid;place-items:center;font-family:Georgia,serif;font-size:1.5rem}
    .brand small{display:block;letter-spacing:.25em;color:#8a5b19;font-size:.7rem}
    .links{display:flex;gap:10px;background:#fff;padding:8px;border-radius:999px}
    .links a{padding:12px 22px;border-radius:999px;font-weight:900}
    .links a.active{background:#241812;color:#fff}
    .shopbtn{background:#d7a447;padding:15px 28px;border-radius:999px;font-weight:1000}
    .hero{padding:90px 9% 60px}
    h1{font-family:Georgia,serif;font-size:clamp(4rem,10vw,8rem);line-height:.86;margin:0}
    .lead{font-size:1.2rem;color:#5e5047;font-weight:750}
    .tools{display:grid;grid-template-columns:1fr 280px;gap:18px;margin:40px 9% 20px}
    input,select{padding:18px;border-radius:18px;border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.8);font-size:1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:28px;padding:20px 9% 80px}
    .card{background:rgba(255,255,255,.86);border-radius:34px;overflow:hidden;box-shadow:0 25px 80px rgba(90,55,25,.14);border:1px solid rgba(120,80,40,.1)}
    .pic{height:320px;position:relative;background:#f5dfc3}
    .pic img{width:100%;height:100%;object-fit:cover}
    .badge{position:absolute;top:16px;left:16px;background:#d7a447;padding:10px 16px;border-radius:999px;font-weight:1000}
    .info{padding:24px}
    .cat{color:#9b6b25;text-transform:uppercase;letter-spacing:.15em;font-weight:1000;font-size:.75rem}
    .info h3{font-size:1.55rem;margin:10px 0}
    .price{font-size:1.35rem;font-weight:1000;color:#8a5b19}
    .desc{color:#5e5047;line-height:1.65}
    .btn{border:0;border-radius:999px;padding:15px 22px;font-weight:1000;cursor:pointer;background:linear-gradient(135deg,#f0c96f,#c9943d);color:#241812;width:100%}
    .loading{grid-column:1/-1;background:rgba(255,255,255,.75);padding:30px;border-radius:24px;font-weight:900;text-align:center}
    @media(max-width:800px){.links{display:none}.tools{grid-template-columns:1fr}.nav,.hero,.tools,.grid{padding-left:5%;padding-right:5%}}
  </style>
</head>
<body>
  <div class="top">SOFT LUXURY • HEALTH • BEAUTY • WELLNESS</div>
  <nav class="nav">
    <a class="brand" href="index.html">
      <span class="logo">R</span>
      <span>Reza Holdings <small>CHAMPAGNE LUXURY</small></span>
    </a>
    <div class="links">
      <a href="index.html">Home</a>
      <a class="active" href="shop.html">Shop</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
      <a href="index.html#policies">Policies</a>
    </div>
    <a class="shopbtn" href="shop.html">Shop</a>
  </nav>

  <section class="hero">
    <h1>All Products</h1>
    <p class="lead">Search, choose and add to cart.</p>
  </section>

  <div class="tools">
    <input id="search" placeholder="Search products...">
    <select id="category"><option value="">All</option></select>
  </div>

  <main id="productsGrid" class="grid">
    <div class="loading">Loading products...</div>
  </main>

  <script>
    const API = location.hostname.includes("localhost") ? "http://localhost:10000" : "https://api.rezaholdings.co.za";
    let allProducts = [];

    function money(v){return "R " + Number(v || 0).toLocaleString("en-ZA",{minimumFractionDigits:2,maximumFractionDigits:2});}
    function img(src){
      if(!src) return "";
      if(src.startsWith("data:image")) return src;
      if(src.startsWith("http")) return src;
      if(src.startsWith("/")) return API + src;
      return src;
    }

    function render(){
      const q = document.getElementById("search").value.toLowerCase();
      const c = document.getElementById("category").value;
      const grid = document.getElementById("productsGrid");

      const products = allProducts.filter(p =>
        p.showOnline !== false &&
        (!q || String(p.name).toLowerCase().includes(q) || String(p.description || "").toLowerCase().includes(q)) &&
        (!c || p.category === c)
      );

      if(!products.length){
        grid.innerHTML = `<div class="loading">No products found.</div>`;
        return;
      }

      grid.innerHTML = products.map(p => `
        <article class="card">
          <div class="pic">
            ${p.badge ? `<span class="badge">${p.badge}</span>` : ""}
            <img src="${img(p.image)}" alt="${p.name}">
          </div>
          <div class="info">
            <div class="cat">${p.category || "Reza Holdings"}</div>
            <h3>${p.name}</h3>
            <div class="price">${money(p.price)}</div>
            <p class="desc">${p.description || ""}</p>
            <button class="btn" onclick='addToCart(${JSON.stringify(p).replace(/'/g,"&apos;")})'>Add to Cart</button>
          </div>
        </article>
      `).join("");
    }

    async function loadProducts(){
      const res = await fetch(API + "/api/products?t=" + Date.now());
      const data = await res.json();
      allProducts = data.products || [];

      const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
      document.getElementById("category").innerHTML = `<option value="">All</option>` + cats.map(c => `<option>${c}</option>`).join("");

      render();
    }

    function addToCart(product){
      const cart = JSON.parse(localStorage.getItem("reza_cart") || "[]");
      const found = cart.find(i => i.id === product.id);
      if(found) found.qty += 1;
      else cart.push({...product, qty:1});
      localStorage.setItem("reza_cart", JSON.stringify(cart));
      alert("Added to cart");
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("category").addEventListener("change", render);
    loadProducts();
  </script>
</body>
</html>
